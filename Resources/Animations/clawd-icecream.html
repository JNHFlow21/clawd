<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clawd Eats Ice Cream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    width: 100%;
    height: 100%;
    background: transparent !important;
  }
  body {
    background: transparent !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    
    
    
    
    
  
    width: 100vw;
    height: 100vh;
    background: transparent !important;
  }
  .info { display: none; }
  .back-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    background: rgba(0,0,0,0.35);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    z-index: 10;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .back-btn:hover {
    background: rgba(0,0,0,0.55);
    color: #fff;
    border-color: rgba(255,255,255,0.6);
  }
  .nav-bar {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    z-index: 2;
  }
  .nav-bar a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    background: rgba(0,0,0,0.3);
    transition: all 0.2s;
  }
  .nav-bar a:hover {
    background: rgba(0,0,0,0.5);
    color: #fff;
    border-color: rgba(255,255,255,0.6);
  }
  .nav-bar .home-link { font-weight: bold; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="info" id="info">clawd eats ice cream - 0.0s / 5.0s</div>
<script src="clawd-icecream.js"></script>
</body>
</html>
